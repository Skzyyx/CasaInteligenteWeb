; PlatformIO - Casa Inteligente ESP32
; Compilar:    pio run
; Subir sketch: pio run -t upload
; Subir UI a LittleFS: pio run -t uploadfs

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv

lib_deps =
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    bblanchon/ArduinoJson
    adafruit/DHT sensor library
    adafruit/Adafruit Unified Sensor
    miguelbalboa/MFRC522
    khoih-prog/MySQL_MariaDB_Generic
    madhephaestus/ESP32Servo

; Quitar las dependencias transitivas de MySQL_MariaDB_Generic
; pensadas para otras placas (Arduino MKR, Nano 33 IoT, ESP8266 con AT, etc.).
; En ESP32 solo necesitamos el WiFi.h nativo del framework arduino-esp32;
; si dejamos estas, IntelliSense resuelve <WiFi.h> al equivocado y rompe
; WiFi.mode() / WIFI_STA.
lib_ignore =
    WiFi101
    WiFi101_Generic
    WiFiNINA_Generic
    WiFiEspAT
    WiFiMulti_Generic
    Ethernet_Generic
    EthernetENC
    UIPEthernet
    WebServer_WT32_ETH01
    ESP_AT_Lib
    ESP8266_AT_WebServer
    ESP8266_AT
    WebServer_ESP32_W5500
    WebServer_ESP32_ENC
    WebServer_ESP32_SC_W5500
    WebServer_ESP32_SC_ENC
    Portenta_H7_AsyncWebServer
    Teensy41_AsyncTCP
    AsyncWebServer_Teensy41
    AsyncWebServer_RP2040W
    AsyncWebServer_WT32_ETH01
    AsyncWebServer_ESP32_W5500
    AsyncWebServer_ESP32_ENC
    AsyncWebServer_ESP32_SC_W5500
    AsyncWebServer_ESP32_SC_ENC

build_flags =
    -DUSING_WIFI_ESP32=true